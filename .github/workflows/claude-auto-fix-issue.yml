name: Auto Fix Triaged Issues

on:
  repository_dispatch:
    types: [claude-fixable]

jobs:
  auto-fix:
    uses: OPCAT-Labs/common-tools/.github/workflows/claude-auto-fix-issue.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_PAT: ${{ secrets.GH_PAT }}
    with:
      allowed_tools: "Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(cargo:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh issue comment:*),Bash(gh issue view:*)"
      build_check_command: "cargo check --all-features"
