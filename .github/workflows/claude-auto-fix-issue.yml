name: Auto Fix Triaged Issues

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

on:
  issues:
    types: [labeled]

jobs:
  auto-fix:
    if: |
      github.event.label.name == 'claude-fixable' &&
      github.event.issue.state == 'open'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="claude-fix-issue-${{ github.event.issue.number }}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "branch_name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Fix issue with Claude
        uses: anthropics/claude-code-action@5f8e5bfe5b03891348854ae401476fc905a6ff6a # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "claude[bot]"
          prompt: |
            Fix issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            Issue body:
            ${{ github.event.issue.body }}

            Instructions:
            1. Read the issue carefully to understand the problem.
            2. Explore the codebase to find the root cause.
            3. Make the minimal code changes needed to fix the issue.
            4. Verify your fix compiles: run `cargo check --all-features`.
            5. Run tests to make sure nothing is broken: `cargo test --lib --all-features`.
            6. Commit the fix to the current branch (${{ steps.branch.outputs.branch_name }}).
            7. Push the branch and open a PR against "main" with:
               gh pr create --title "fix: resolve #${{ github.event.issue.number }} - ${{ github.event.issue.title }}" \
                 --body "Fixes #${{ github.event.issue.number }}\n\nAutomated fix generated by Claude." \
                 --head "${{ steps.branch.outputs.branch_name }}"
            8. If you cannot fix the issue, comment on it explaining why:
               gh issue comment ${{ github.event.issue.number }} --body "I was unable to automatically fix this issue. <reason>"
          claude_args: >
            --max-turns 25
            --allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(cargo:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh issue comment:*)'
