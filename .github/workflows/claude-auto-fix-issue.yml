name: Auto Fix Triaged Issues

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

on:
  repository_dispatch:
    types: [claude-fixable]

jobs:
  auto-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Get issue details
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          NUMBER="${{ github.event.client_payload.issue_number }}"
          echo "number=$NUMBER" >> $GITHUB_OUTPUT
          TITLE=$(gh issue view "$NUMBER" --repo "${{ github.repository }}" --json title --jq '.title')
          echo "title=$TITLE" >> $GITHUB_OUTPUT
          echo "assignee=${{ github.event.client_payload.assignee }}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup git identity
        run: |
          git config --global user.email "claude[bot]@users.noreply.github.com"
          git config --global user.name "claude[bot]"

      - name: Create fix branch
        id: branch
        run: |
          BRANCH="claude-fix-issue-${{ steps.issue.outputs.number }}-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          echo "branch_name=$BRANCH" >> $GITHUB_OUTPUT

      - name: Fix issue with Claude
        uses: anthropics/claude-code-action@5f8e5bfe5b03891348854ae401476fc905a6ff6a # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: "claude[bot]"
          prompt: |
            Fix issue #${{ steps.issue.outputs.number }}: ${{ steps.issue.outputs.title }}

            First, read the full issue details:
            gh issue view ${{ steps.issue.outputs.number }}

            Instructions:
            1. Read the issue carefully to understand the problem.
            2. Make the minimal code changes needed to fix the issue. Do NOT explore unrelated files.
            3. Only run `cargo check --all-features` if you changed functional code (skip for comment, typo, or documentation-only changes).
            4. Commit the fix to the current branch (${{ steps.branch.outputs.branch_name }}).
            5. Push the branch and open a PR against "main" with:
               gh pr create --title "fix: resolve #${{ steps.issue.outputs.number }} - ${{ steps.issue.outputs.title }}" \
                 --body "Fixes #${{ steps.issue.outputs.number }}\n\nAutomated fix generated by Claude." \
                 --head "${{ steps.branch.outputs.branch_name }}"
            6. If "${{ steps.issue.outputs.assignee }}" is not empty, assign the PR to them:
               gh pr edit --add-assignee "${{ steps.issue.outputs.assignee }}"
            7. If you cannot fix the issue, comment on it explaining why:
               gh issue comment ${{ steps.issue.outputs.number }} --body "I was unable to automatically fix this issue. <reason>"
          claude_args: >
            --max-turns 30
            --allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(cargo:*),Bash(gh pr create:*),Bash(gh pr edit:*),Bash(gh pr view:*),Bash(gh issue comment:*),Bash(gh issue view:*)'
